<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; background: #fdf2f8; display: flex; justify-content: center; padding: 30px; }

.report-window { 
    max-width: 600px; width: 100%; background: white; 
    padding: 40px; border-radius: 30px; 
    box-shadow: 0 25px 50px rgba(0,0,0,0.1);
}

.badge { background: #2600ff; color: white; padding: 6px 18px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: 600; }

.form-group { margin-bottom: 25px; }
label { display: block; margin-bottom: 10px; font-weight: 600; }

input, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; }

button { padding: 14px; border-radius: 12px; border: none; cursor: pointer; }

.gps-btn { background: #0ea5e9; color: white; margin-bottom: 15px; }
.btn-submit { width: 100%; background: #2600ff; color: white; font-weight: bold; }
</style>
</head>

<body>

<div class="report-window">
<div class="badge" id="categoryName">Issue</div>

<h2>Report Issue</h2>

<button class="gps-btn" onclick="getPreciseLocation()">📍 Detect Location</button>

<input id="locSearch" placeholder="Location">

<textarea id="desc" placeholder="Describe issue"></textarea>

<button class="btn-submit" onclick="submitIssue()">Submit</button>
</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
document.getElementById('categoryName').innerText = urlParams.get('type') || "Civic Issue";

let lat = "";
let lng = "";

/* LOCATION */
function getPreciseLocation() {
    navigator.geolocation.getCurrentPosition(async (pos) => {
        lat = pos.coords.latitude;
        lng = pos.coords.longitude;

        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
        const data = await res.json();

        document.getElementById("locSearch").value = data.display_name;
    });
}

/* SUBMIT */
function submitIssue() {

    const location = document.getElementById("locSearch").value;
    const description = document.getElementById("desc").value;
    fetch("https://audriana-ungesticular-tonically.ngrok-free.dev/report", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        type: document.getElementById("categoryName").innerText,
        location: document.getElementById("locSearch").value,
        description: document.getElementById("desc").value,
        priority: "High",
        image: "",
        lat: lat,
        lng: lng
    })
})
