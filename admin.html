<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{background:#05070a;color:white;font-family:Poppins;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:15px;margin:10px}
button{margin:5px;padding:8px;border:none;border-radius:8px}
.green{background:#22c55e}
.orange{background:#f59e0b}
</style>
</head>

<body>

<h2>⚙ Admin Panel</h2>
<div id="data"></div>

<script>

const API="https://audriana-ungesticular-tonically.ngrok-free.dev";

function load(){

fetch(API+"/issues")
.then(res=>res.json())
.then(data=>{

let html="";

data.reverse().forEach(i=>{

html+=`
<div class="card">

<b>${i.type}</b><br>
${i.description}<br>
📍 ${i.location}<br>
Status: ${i.status}<br>

${i.image ? `<img src="${i.image}" style="width:100%;border-radius:10px;margin-top:10px;">` : ""}

<button class="orange" onclick="update(${i.id},'In Progress')">In Progress</button>
<button class="green" onclick="update(${i.id},'Resolved')">Resolved</button>

</div>
`;

});

document.getElementById("data").innerHTML=html;

})
.catch(()=>{
document.getElementById("data").innerHTML="<p>❌ Backend not reachable</p>";
});

}

function update(id,status){

fetch(`${API}/update/${id}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status:status})
})
.then(()=>load());

}

setInterval(load,5000);
load();

</script>

</body>
</html>
